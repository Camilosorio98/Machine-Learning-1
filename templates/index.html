<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MachineLearning</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container py-4">
    <h1 class="mb-4">Recomendación de práctica diaria</h1>

    <form method="post" action="/">
      <div class="mb-3">
        <label for="plataforma" class="form-label">Plataforma</label>
        <select id="plataforma" class="form-select" name="plataforma" required>
          <option value="">Selecciona una opción</option>
          <option value="Android">Android</option>
          <option value="iOS">iOS</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="objetivo_principal" class="form-label">Objetivo principal</label>
        <select id="objetivo_principal" class="form-select" name="objetivo_principal" required>
          <option value="">Selecciona un objetivo</option>
          <option value="Precision">Precisión</option>
          <option value="Velocidad">Velocidad</option>
          <option value="Memoria ritmica">Memoria rítmica</option>
          <option value="Coordinacion">Coordinación</option>
          <option value="Lectura">Lectura</option>
        </select>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="nivel_polirr" class="form-label">Nivel polirrítmico</label>
          <select id="nivel_polirr" class="form-select" name="nivel_polirr" required>
            <option value="">Selecciona nivel</option>
            <option value="1:1">1:1</option>
            <option value="2:1">2:1</option>
            <option value="3:2">3:2</option>
            <option value="4:3">4:3</option>
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <label for="edad" class="form-label">Edad</label>
          <input id="edad" type="number" class="form-control" name="edad" min="10" max="80" required>
        </div>
      </div>

      <div class="mb-3">
        <label for="aciertos_pct" class="form-label">Aciertos (%)</label>
        <input id="aciertos_pct" type="number" class="form-control" name="aciertos_pct" min="0" max="100" required>
      </div>

      <div class="mb-3">
        <label for="errores_pct" class="form-label">Errores (%)</label>
        <input id="errores_pct" type="number" class="form-control" name="errores_pct" min="0" max="100" required>
      </div>

      <button class="btn btn-dark" type="submit">Calcular recomendación</button>
    </form>

    {% if pred is not none %}
    <div class="alert alert-success mt-4">
      <h4>✅ {{ pred }} minutos recomendados de práctica</h4>
    </div>
    {% endif %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
