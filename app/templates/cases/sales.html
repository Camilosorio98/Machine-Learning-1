{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="card shadow border-0 overflow-hidden">
        <div class="card-header bg-primary text-white p-4">
            <h2 class="display-6 mb-0"><i class="bi bi-graph-up-arrow me-2"></i>{{ data.title }}</h2>
        </div>
        <div class="card-body p-4">
            <h4 class="fw-bold">Problem Description</h4>
            <p class="text-muted fs-5">{{ data.problem }}</p>
            <hr>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="p-4 bg-light rounded-3 h-100">
                        <h5 class="text-primary fw-bold">ML Technical Specs</h5>
                        <ul class="list-unstyled mt-3">
                            <li class="mb-2"><strong>Model Type:</strong> {{ data.ml_type }}</li>
                            <li class="mb-2"><strong>Input Features:</strong> {{ data.inputs }}</li>
                            <li class="mb-2"><strong>Target Output:</strong> {{ data.outputs }}</li>
                        </ul>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="p-4 bg-primary bg-opacity-10 rounded-3 h-100 border border-primary border-opacity-25">
                        <h5 class="text-primary fw-bold">Strategic Relevance</h5>
                        <p class="mt-3">{{ data.relevance }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
