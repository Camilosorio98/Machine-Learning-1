{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="card shadow border-0 overflow-hidden">
        <div class="card-header bg-info text-white p-4">
            <h2 class="display-6 mb-0"><i class="bi bi-box-seam me-2"></i>{{ data.title }}</h2>
        </div>
        <div class="card-body p-4">
            <h4 class="fw-bold">Operational Context</h4>
            <p class="text-muted fs-5">{{ data.problem }}</p>
            <hr>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="p-4 bg-light rounded-3 h-100">
                        <h5 class="text-info fw-bold">Algorithm Setup</h5>
                        <ul class="list-unstyled mt-3 text-dark">
                            <li class="mb-2"><strong>Method:</strong> {{ data.ml_type }}</li>
                            <li class="mb-2"><strong>Dataset Variables:</strong> {{ data.inputs }}</li>
                            <li class="mb-2"><strong>Predicted Demand:</strong> {{ data.outputs }}</li>
                        </ul>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="p-4 bg-info bg-opacity-10 rounded-3 h-100 border border-info border-opacity-25">
                        <h5 class="text-info fw-bold">Supply Chain Relevance</h5>
                        <p class="mt-3 text-dark">{{ data.relevance }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
