{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="card shadow border-0 overflow-hidden">
        <div class="card-header bg-warning text-dark p-4">
            <h2 class="display-6 mb-0"><i class="bi bi-cart-check me-2"></i>{{ data.title }}</h2>
        </div>
        <div class="card-body p-4">
            <h4 class="fw-bold text-dark">Consumer Analysis</h4>
            <p class="text-muted fs-5">{{ data.problem }}</p>
            <hr>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="p-4 bg-light rounded-3 h-100">
                        <h5 class="text-dark fw-bold">Model Components</h5>
                        <ul class="list-unstyled mt-3">
                            <li class="mb-2"><strong>Framework:</strong> {{ data.ml_type }}</li>
                            <li class="mb-2"><strong>User Data:</strong> {{ data.inputs }}</li>
                            <li class="mb-2"><strong>Forecast:</strong> {{ data.outputs }}</li>
                        </ul>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="p-4 bg-warning bg-opacity-10 rounded-3 h-100 border border-warning border-opacity-25">
                        <h5 class="text-dark fw-bold">Business Value</h5>
                        <p class="mt-3 text-dark">{{ data.relevance }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
